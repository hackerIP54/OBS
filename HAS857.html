<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #ffffff;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-align: center;
            background: linear-gradient(270deg, #ff7b00, #ff007b, #7b00ff, #00f2fe);
            background-size: 800% 800%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fluidMove 12s ease infinite;
        }

        @keyframes fluidMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .copyright-footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        .copyright-footer p {
            font-size: 0.85rem;
            color: #666666;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <h1>Chat Offline</h1>

    <footer class="copyright-footer">
        <p>&copy; 2026 HackerIP54, bombblingm. All rights reserved</p>
    </footer>

</body>
</html>
