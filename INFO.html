<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

       
        .glass-card {
            background: rgba(255, 255, 255, 0.05); /* Sehr transparente weiße Schicht */
            backdrop-filter: blur(16px); /* Der entscheidende Weichzeichner-Effekt */
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 80px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtile Lichtkante am Rand */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

      
        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.01em;
            line-height: 1.1;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Marco_scm: Offline</h1>
    </div>

</body>
</html>
